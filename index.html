<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Updated Demo Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }
    .card {
      text-align: center;
      padding: 3rem;
      border-radius: 16px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.25);
      max-width: 500px;
    }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    p { color: rgba(255,255,255,0.85); margin-top: 1rem; line-height: 1.6; }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      background: rgba(255,255,255,0.2);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Updated! 🎨</h1>
    <p>This is the refreshed version of my GitHub Pages site.</p>
    <span class="badge">Pushed via Hermes Agent</span>
  </div>
</body>
</html>
